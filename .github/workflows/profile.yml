name: Profile

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    name: update

    steps:
      - uses: actions/checkout@v7

      # Language cards only. Cards that total commits, pull requests or stars
      # across the account's history are rejected non-deterministically here,
      # whichever tool generates them.
      #
      # This generator counts repositories and commits rather than bytes of
      # code; byte-weighted stats let early large projects drown out the
      # languages actually in use now.
      - name: Generate language cards
        continue-on-error: true
        uses: vn7n24fzkq/github-profile-summary-cards@v0.11.6
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          THEME: github
          UTC_OFFSET: 8
          AUTO_PUSH: false

      - name: Publish language cards
        run: ./scripts/publish-cards.sh

      - name: Commit language cards
        run: |
          git config user.name "profile-bot"
          git config user.email "profile-bot@users.noreply.github.com"
          git add cards
          if git diff --cached --quiet; then
            echo "cards unchanged"
          else
            git commit -m "Update language cards"
            git push
          fi

      # Sourced from the English feed, with the Chinese original linked
      # alongside. The two languages are not always published in pairs; starting
      # from the English side keeps the list consistent with an English README
      # and never produces a dead link.
      - name: Update writing list
        uses: gautamkrishnar/blog-post-workflow@1.9.6
        env:
          # Posts carry a Taipei-midnight pubDate; the runner's UTC default
          # would date every one of them a day early.
          TZ: Asia/Taipei
        with:
          feed_list: "https://blog.aotoki.me/en/index.xml"
          max_post_count: 5
          template: "$newline- $title · $date"
          date_format: "yyyy-mm-dd"
          item_exec: 'post.title = "[" + post.title + "](" + post.url + ") · [中文](" + post.url.replace("/en/", "/") + ")"'
          disable_html_encoding: true # keeps the parentheses in markdown links from becoming &lpar;
          commit_message: "Update writing list"
          committer_username: "profile-bot"
          committer_email: "profile-bot@users.noreply.github.com"
