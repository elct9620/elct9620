name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 0 * * *" # 每天一次；密集執行會撞上 GitHub 的 secondary rate limit
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate

    steps:
      - uses: actions/checkout@v7
      - uses: vn7n24fzkq/github-profile-summary-cards@v0.11.6
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          THEME: github # README 只引用 github 主題，不必產生全部 68 種
          UTC_OFFSET: 8
